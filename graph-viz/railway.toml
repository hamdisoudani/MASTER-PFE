# Railway service config for graph-viz sidecar.
# In Railway set Root Directory = /  (repo root) so the Dockerfile can
# COPY both ./agent and ./graph-viz. Set Dockerfile Path = graph-viz/Dockerfile.

[build]
builder = "dockerfile"
dockerfilePath = "graph-viz/Dockerfile"

[deploy]
startCommand = "sh -c 'exec uvicorn app:app --app-dir /app/graph-viz --host 0.0.0.0 --port $PORT --proxy-headers'"
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
