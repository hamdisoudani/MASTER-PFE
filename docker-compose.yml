version: "3.9"

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./agent/.env
    environment:
      PORT: "2024"
    ports:
      - "2024:2024"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PORT: "3001"
      CORS_ORIGINS: http://localhost:3000
      LANGGRAPH_URL: http://agent:2024
    ports:
      - "3001:3001"
    depends_on:
      agent:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_URL: http://localhost:2024
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        NEXT_PUBLIC_ASSISTANT_ID: syllabus_agent
    restart: unless-stopped
    env_file: ./frontend/.env.local
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
