version: '3.9'

services:
  agent:
    build: ./agent
    ports:
      - '8000:8000'
    env_file: ./agent/.env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    env_file: ./backend/.env
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    environment:
      AGENT_URL: http://agent:8000/copilotkit
      CORS_ORIGINS: http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    env_file: ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_COPILOTKIT_RUNTIME_URL: http://backend:3001/copilotkit
      NEXT_PUBLIC_API_BASE_URL: http://backend:3001
